<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MH Synthevia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        .dashboard { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .widget { background: #fff; padding: 1.5rem; margin: 1rem 0; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Dashboard</h1>
        <div class="widget">
            <h2>Welcome to Dashboard</h2>
            <p>Monitor your activities and performance metrics here.</p>
        </div>
        <div class="widget">
            <h2>Statistics</h2>
            <p>Total Users: 1,234</p>
            <p>Active Sessions: 567</p>
            <p>Conversion Rate: 12.5%</p>
        </div>
    </div>
</body>
</html>
