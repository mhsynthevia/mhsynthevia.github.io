<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MH Synthevia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .login-form { background: #fff; padding: 2rem; border-radius: 5px; max-width: 400px; margin: 0 auto; }
        input, button { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 3px; }
        button { background: #2c3e50; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Admin Panel</h1>
        <div class="login-form">
            <h2>Login</h2>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button>Login</button>
        </div>
    </div>
</body>
</html>
