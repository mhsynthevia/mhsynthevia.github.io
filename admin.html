<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MH Synthevia</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #001a41; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #002d72; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00b1eb; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #002d72; }
        #error-msg { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>MHS Admin</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="error-msg">Invalid Credentials!</p>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // Temporary Static Credentials (Bhai yahan apna email/pass set karlo)
            if(email === "admin@mhsynthevia.com" && pass === "admin123") {
                localStorage.setItem("isLoggedIn", "true"); // Login status save kar liya
                window.location.href = "admin-dashboard.html"; // Dashboard par bhej diya
            } else {
                document.getElementById('error-msg').style.display = "block";
            }
        }
    </script>
</body>
</html>
